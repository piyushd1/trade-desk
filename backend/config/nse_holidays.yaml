# NSE Holiday Calendar for TradeDesk
#
# Source of truth: https://www.nseindia.com/resources/exchange-communication-holidays
#
# This file is used by backend/app/utils/market_calendar.py::is_market_open()
# to decide whether the snapshot scheduler should capture portfolio data for
# a given date. Weekend handling is done separately by the cron trigger
# (`*/15 * * * 1-5` — Monday through Friday only) and by an explicit weekday
# check in the Python loader, so this file only needs to list *weekday*
# holidays.
#
# MAINTAINER NOTE:
#   This list requires MANUAL UPDATE once a year when NSE publishes the
#   next year's official holiday calendar (typically in December). The
#   dates below are a reasonable-confidence draft — gazetted Gregorian
#   holidays are accurate, but lunar / religious holidays (Holi, Diwali,
#   Eid, etc.) need to be verified against the NSE notice before a new
#   year starts because their Gregorian dates shift annually.
#
#   When adding a new year, prefer confidence over completeness: a
#   holiday listed here causes the scheduler to SKIP that day, so a
#   wrong date just means a wasted fetch. A MISSING holiday is worse —
#   the scheduler fires, calls the broker API, the broker returns
#   previous-day data (or an error), and we pollute the history with
#   bad snapshots.
#
# Format:
#   YYYY:
#     - YYYY-MM-DD  # Human-readable description (verified | TODO verify)
#
# Entries marked with "# TODO verify" are placeholders — the Gregorian
# date depends on lunar or religious observance and needs confirmation
# from the NSE notice before relying on it.

2026:
